name: 更新并部署AI情报雷达

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: ["main"]
    paths-ignore:
      - "data/articles.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 安装Serenity重点博主页面
        run: python scripts/add_serenity_watch.py

      - name: 调整首页内容顺序
        run: python scripts/reorder_latest_first.py

      - name: 安装国内外大模型资讯模块
        run: python scripts/add_llm_news_module.py

      - name: 修复新闻快捷搜索
        run: python scripts/fix_search_links.py

      - name: 安装AI赚钱与副业情报模块
        run: python scripts/add_ai_income_module.py

      - name: 优化AI副业搜索兼容性
        run: python scripts/fix_ai_income_module.py

      - name: 校验程序和配置
        run: |
          python -m py_compile scripts/fetch_news.py scripts/enrich_priority_media.py scripts/add_serenity_watch.py scripts/reorder_latest_first.py scripts/add_llm_news_module.py scripts/fix_search_links.py scripts/add_ai_income_module.py scripts/fix_ai_income_module.py
          python -m json.tool config/sources.json > /dev/null

      - name: 抓取最新公开资讯
        run: python scripts/fetch_news.py

      - name: 追加彭博社与财联社重点资讯
        run: python scripts/enrich_priority_media.py

      - name: 保存最新页面、配置与数据
        run: |
          git config user.name "ai-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html config/sources.json data/articles.json
          git diff --cached --quiet || git commit -m "feat: add AI income and side-hustle intelligence"
          git push || true

      - name: 配置Pages
        uses: actions/configure-pages@v5

      - name: 上传Pages文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布Pages
        id: deployment
        uses: actions/deploy-pages@v4
