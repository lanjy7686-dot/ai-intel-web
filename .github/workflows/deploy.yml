name: 更新并部署AI情报雷达

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"
  push:
    branches: ["main"]
    paths-ignore:
      - "data/articles.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取免费公开资讯
        run: python scripts/fetch_news.py

      - name: 保存最新数据
        run: |
          git config user.name "ai-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "chore: update free AI intelligence data"
          git push || true

      - name: 配置Pages
        uses: actions/configure-pages@v5

      - name: 上传Pages文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布Pages
        id: deployment
        uses: actions/deploy-pages@v4
